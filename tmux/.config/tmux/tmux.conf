# Plugins (Tmux Plugin Manager)
# git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/.config/tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# Set prefix as Ctrl+Space
unbind C-b
set -g prefix C-space
bind C-space send-prefix

# Options
set -sg terminal-overrides ",*:RGB"  # true color support
set -g escape-time 0  # disable delays on escape sequences
set -g mouse on
set -g repeat-time 1000  # increase "prefix-free" window

# Options: start indexes from 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1 
set -g renumber-windows on  # keep numbering sequential

# Tmux-yank plugin
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection 
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Theme: borders
set -g pane-border-style fg=black,bright
set -g pane-active-border-style fg=magenta

# Theme: status
set -g status-style bg=default,fg=black,bright
set -g status-left ""
set -g status-right "#[fg=black,bright]#S"

# Theme: status (windows)
set -g window-status-format "●"
set -g window-status-current-format "●"
set -g window-status-current-style "#{?window_zoomed_flag,fg=yellow,fg=magenta,nobold}"
set -g window-status-bell-style "fg=red,nobold"

# Keybindings: select pane ( HJKL )
bind k select-pane -U
bind h select-pane -L
bind j select-pane -D
bind l select-pane -R

# Keybindings: select pane ( arrows )
bind Up select-pane -U
bind Left select-pane -L
bind Down select-pane -D
bind Right select-pane -R

# Keybindings: select panes ( Alt+HJKL )
bind -n M-k select-pane -U
bind -n M-j select-pane -D
bind -n M-h select-pane -L
bind -n M-l select-pane -R

# Keybindings: select panes ( Alt+arrows )
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R

# Keybindings: resize panes ( Ctrl+Alt+HJKL )
bind -r C-M-k resize-pane -U 10
bind -r C-M-h resize-pane -L 10
bind -r C-M-j resize-pane -D 10
bind -r C-M-l resize-pane -R 10

# Keybindings: resize panes ( arrows )
bind -r  Up resize-pane -U 10
bind -r Left resize-pane -L 10
bind -r Down resize-pane -D 10
bind -r Right resize-pane -R 10

# Keybindings: split
bind | split-window -h
bind / split-window -h
bind Enter split-window -h
bind -n M-Enter split-window -h 
bind Space split-window -v
bind -n M-Space split-window -v
bind v split-window -v
bind - split-window -v

bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9
bind -n M-0 select-window -t :10

# Keybindings: other
bind f resize-pane -Z
bind -n M-f resize-pane -Z # Fullscreeen pane (Alt+F)
bind q detach-client
bind -n M-q detach-client
bind x kill-pane
bind -n M-x kill-pane
bind w choose-window -Z
bind -n M-w choose-window -Z
bind n new-window
bind -n M-n new-window

# Initializes TPM (Tmux Plugin Manager)
run '~/.config/tmux/plugins/tpm/tpm'
