###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, exec, ~/.config/hypr/scripts/toggle_floating.sh
bind = $mainMod, F, fullscreen,
bind = , F11, fullscreen,
bind = $mainMod, period, exec, emote
bind = $mainMod, R, exec, $menu
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, I, exec, $browser
bind = $mainMod SHIFT, R, exec, hyprctl reload

# DankMaterialShell (DMS Quickshell) https://github.com/AvengeMedia/DankMaterialShell.git
bind = $mainMod, space, exec, dms ipc call spotlight toggle
bind = $mainMod, C, exec, dms ipc call clipboard toggle
bind = $mainMod SHIFT, N, exec, dms ipc call notifications toggle
bind = $mainMod, X, exec, dms ipc call powermenu toggle
bind = $mainMod, D, exec, dms ipc call dash toggle media
bind = $mainMod, O, exec, dms ipc call dash toggle calendar
bind = $mainMod, L, exec, dms ipc call lock lock

# print
# Capture whole screen (and saves in ~/Pictures/Screenshots/)
bind = , Print, exec, grim - | wl-copy --type image/png 

# Captures selected area 
bind = $mainMod CTRL, S, exec, grim -g "$(slurp)" ~/Pictures/Screenshot_$(date +%Y%m%d_%H%M%S).png

# Capturar e copiar para clipboard (Ctrl+V)
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10


# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Switch to previous workspace
bind = ALT, Tab, workspace, previous
bind = $mainMod, Tab, workspace, e+1

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Move/resize windows with mainMod + arrow keys
bind = $mainMod SHIFT, right, resizeactive, 50 0    # Aumenta largura
bind = $mainMod SHIFT, left, resizeactive, -50 0    # Diminui largura
bind = $mainMod SHIFT, up, resizeactive, 0 -50      # Aumenta altura
bind = $mainMod SHIFT, down, resizeactive, 0 50     # Diminui altura

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessDown, exec, hyprctl hyprsunset gamma -10 # Uses bluelight protection
bindel = ,XF86MonBrightnessUp, exec, hyprctl hyprsunset gamma +10

# Playback control - Requires playerctl
bind = $mainMod, N, exec, playerctl -p spotify next
bind = $mainMod, P, exec, playerctl -p spotify previous
bind = $mainMod shift, P, exec, playerctl -p spotify play-pause

