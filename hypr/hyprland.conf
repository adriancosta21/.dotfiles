#################
## MONITORS ###
################

monitor = , preferred, auto, 1

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun
$browser =  zen-browser 
$wallpaper_path =  ~/.dotfiles/Wallpapers/evangelion-poster-desktop.png

$mainMod = SUPER # Sets win key as mainMod
#################  
### autostart ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# admin permission everytime hyprland is loaded
exec-once = systemctl --user start hyprpolkitagent
exec-once = dms run # Starts DMS Quickshell

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE, 20
env = HYPRCURSOR_SIZE,24
env = GDK_SCALE,1
env = GDK_DPI_SCALE,1.25
env = QT_SCALE_FACTOR,1

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 4 
    gaps_out = 4
    border_size = 2

# https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true
    extend_border_grab_area = 20
    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 6
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1
    inactive_opacity = 0.9

    shadow {
        enabled = true
        range = 1
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 2
        passes = 4
        new_optimizations = true
        vibrancy = 0.1696
    }
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule = border_size 0, match:float 0, match:workspace w[tv1]
windowrule = rounding 0, match:float 0, match:workspace w[tv1]
windowrule = border_size 0, match:float 0, match:workspace f[1]
windowrule = rounding 0, match:float 0, match:workspace f[1]

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
    split_width_multiplier = 1.2
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    mouse_move_enables_dpms = false
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = br
    kb_variant = abnt2
    kb_model = abnt2
    kb_options =
    kb_rules =

    follow_mouse = 1
    mouse_refocus=false
    sensitivity = 0.5 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
        disable_while_typing = false
    }
}
# GESTURES
# https://wiki.hypr.land/Configuring/Gestures/
gesture = 4, horizontal, workspace
gesture = 4, vertical, dispatcher, exec, hyprctl --batch "dispatch togglefloating; dispatch resizeactive exact 1200 800; dispatch centerwindow"
gesture = 3, swipe, move

# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.6
}



# Floting window rules

windowrule = match:class .*, center 1

## File Manager
windowrule = match:class $fileManager, float 1
windowrule = match:class $fileManager, move 20 70
windowrule = match:class $fileManager, size 800 600

## Terminal
windowrule = match:class $terminal, size 1000 600

## Browser (corrigido typo $broser -> $browser)
windowrule = match:class $browser, float 1

# -------------------------
# Correção de drag no XWayland
# -------------------------

windowrule = match:xwayland 1, match:class ^$, match:title ^$, float 1, fullscreen 0

# -------------------------
# Steam Configuration
# -------------------------

windowrule = match:class ^steam_app\d+$, fullscreen 1
windowrule = match:class ^steam_app\d+$, monitor 1
windowrule = match:class ^steam_app\d+$, workspace 10

workspace = 10, border:false, rounding:false

### Sources
# Animations
source = ~/.config/hypr/animations.conf
# Bindings
source = ~/.config/hypr/bindings.conf

source = ./dms/cursor.conf
